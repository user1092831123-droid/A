<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            color: #333;
            font-weight: bold;
            min-width: 120px;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        input[type="range"] {
            flex: 1;
            min-width: 200px;
        }

        .slider-value {
            color: #667eea;
            font-weight: bold;
            min-width: 60px;
            text-align: right;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .tree-panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            color: #333;
            max-height: 70vh;
            overflow-y: auto;
        }

        .tree-node {
            display: flex;
            align-items: flex-start;
            margin: 5px 0;
            transition: background-color 0.2s;
            padding: 5px;
            border-radius: 3px;
        }

        .tree-node:hover {
            background-color: #f5f5f5;
        }

        .tree-node.hidden {
            display: none;
        }

        .tree-node.highlight {
            background-color: #ffeb3b;
        }

        .toggle-btn {
            width: 20px;
            height: 20px;
            min-width: 20px;
            padding: 0;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .toggle-btn:hover {
            background: #764ba2;
        }

        .toggle-btn.no-children {
            visibility: hidden;
            cursor: default;
        }

        .tree-content {
            flex: 1;
            word-break: break-word;
        }

        .children {
            margin-left: 20px;
        }

        .children.hidden {
            display: none;
        }

        .search-highlight {
            background-color: #ffeb3b;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .control-group {
                flex-direction: column;
                align-items: stretch;
            }

            label {
                min-width: auto;
            }

            input[type="text"],
            input[type="range"] {
                min-width: auto;
            }

            .slider-value {
                text-align: left;
            }
        }

        .highlight-match {
            background-color: #ffeb3b;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tree Viewer</h1>

        <div class="controls">
            <div class="control-group">
                <label for="searchInput">Search:</label>
                <input type="text" id="searchInput" placeholder="Type to search (Ctrl+F)...">
                <button onclick="clearSearch()">Clear</button>
            </div>
            <div class="control-group">
                <label for="depthSlider">Show Details:</label>
                <input type="range" id="depthSlider" min="0" max="6" value="6">
                <span class="slider-value"><span id="depthValue">All</span></span>
            </div>
            <div class="control-group">
                <button onclick="collapseAll()">Collapse All</button>
                <button onclick="expandAll()">Expand All</button>
                <button onclick="resetTree()">Reset</button>
            </div>
        </div>

        <div class="tree-panel" id="treePanel"></div>
    </div>

    <script>
        const treeData = {
            name: "Achilles",
            children: [
                {
                    name: "Firestrike",
                    children: [
                        { name: "Exodus" },
                        { name: "Leerk" },
                        { name: "redhorseofthewest" },
                        { name: "Villox_veez" },
                        { name: "whitefire2006e" },
                        {
                            name: "xqGhost",
                            children: [
                                {
                                    name: "Thefurienocturne",
                                    children: [
                                        { name: "CaptainBHM" },
                                        { name: "Cookie" },
                                        { name: "IcyFlex" },
                                        { name: "Mercy_Gzz200" },
                                        { name: "Vik" }
                                    ]
                                }
                            ]
                        }
                    ]
                },
                { name: "Sec_Freezy" },
                {
                    name: "Unit",
                    children: [
                        {
                            name: "Lodiani",
                            children: [
                                { name: "Joker" }
                            ]
                        }
                    ]
                }
            ]
        };

        const acroxityData = {
            name: "Acroxity",
            children: [
                { name: "Castoff" },
                { name: "EAsportlollol" }
            ]
        };

        let maxDepth = 0;
        let expandedNodes = new Set();
        let searchTerm = "";

        function getMaxDepth(node, depth = 0) {
            maxDepth = Math.max(maxDepth, depth);
            if (node.children && node.children.length > 0) {
                node.children.forEach(child => getMaxDepth(child, depth + 1));
            }
        }

        function createNodeId(path) {
            return "node-" + path.join("-");
        }

        function renderTree(node, container, path = [], maxShowDepth = 6) {
            const nodeId = createNodeId(path);
            const nodeDiv = document.createElement("div");
            nodeDiv.className = "tree-node";
            nodeDiv.id = nodeId;
            nodeDiv.setAttribute("data-depth", path.length);
            nodeDiv.setAttribute("data-path", path.join("/"));
            nodeDiv.setAttribute("data-name", node.name.toLowerCase());

            const hasChildren = node.children && node.children.length > 0;
            const isExpanded = expandedNodes.has(nodeId);
            const belowMaxDepth = path.length >= maxShowDepth;

            if (belowMaxDepth) {
                nodeDiv.classList.add("hidden");
            }

            // Toggle button
            const toggleBtn = document.createElement("button");
            toggleBtn.className = "toggle-btn";
            if (!hasChildren) {
                toggleBtn.classList.add("no-children");
            } else {
                toggleBtn.textContent = isExpanded ? "−" : "+";
                toggleBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleNode(nodeId, node, path);
                };
            }
            nodeDiv.appendChild(toggleBtn);

            // Content
            const content = document.createElement("div");
            content.className = "tree-content";
            content.textContent = node.name;
            nodeDiv.appendChild(content);

            container.appendChild(nodeDiv);

            // Children
            if (hasChildren) {
                const childrenDiv = document.createElement("div");
                childrenDiv.className = "children";
                childrenDiv.id = nodeId + "-children";

                if (!isExpanded) {
                    childrenDiv.classList.add("hidden");
                }

                node.children.forEach((child, index) => {
                    renderTree(child, childrenDiv, [...path, index], maxShowDepth);
                });

                container.appendChild(childrenDiv);
            }
        }

        function renderFullTree() {
            const panel = document.getElementById("treePanel");
            panel.innerHTML = "";
            expandedNodes.clear();

            const maxShowDepth = parseInt(document.getElementById("depthSlider").value);

            const rootContainer = document.createElement("div");
            renderTree(treeData, rootContainer, [], maxShowDepth);
            panel.appendChild(rootContainer);

            const acroxityContainer = document.createElement("div");
            acroxityContainer.style.marginTop = "30px";
            renderTree(acroxityData, acroxityContainer, [], maxShowDepth);
            panel.appendChild(acroxityContainer);

            applySearch();
        }

        function toggleNode(nodeId, node, path) {
            if (expandedNodes.has(nodeId)) {
                expandedNodes.delete(nodeId);
            } else {
                expandedNodes.add(nodeId);
            }
            renderFullTree();
        }

        function collapseAll() {
            expandedNodes.clear();
            renderFullTree();
        }

        function expandAll() {
            const panel = document.getElementById("treePanel");
            const nodes = panel.querySelectorAll(".tree-node");
            nodes.forEach(node => {
                const nodeId = node.id;
                if (node.querySelector(".toggle-btn:not(.no-children)")) {
                    expandedNodes.add(nodeId);
                }
            });
            renderFullTree();
        }

        function resetTree() {
            document.getElementById("searchInput").value = "";
            document.getElementById("depthSlider").value = maxDepth;
            document.getElementById("depthValue").textContent = "All";
            expandedNodes.clear();
            searchTerm = "";
            renderFullTree();
        }

        function applySearch() {
            const searchValue = document.getElementById("searchInput").value.toLowerCase().trim();
            const nodes = document.querySelectorAll(".tree-node");

            nodes.forEach(node => {
                const nodeName = node.getAttribute("data-name");
                const matches = searchValue && nodeName.includes(searchValue);

                if (matches) {
                    node.classList.add("highlight");
                    // Expand all parents
                    let parent = node.parentElement;
                    while (parent) {
                        const parentNode = parent.closest(".tree-node");
                        if (parentNode) {
                            expandedNodes.add(parentNode.id);
                            const childrenDiv = document.getElementById(parentNode.id + "-children");
                            if (childrenDiv) {
                                childrenDiv.classList.remove("hidden");
                            }
                        }
                        parent = parent.parentElement;
                    }
                } else {
                    node.classList.remove("highlight");
                }
            });

            // Re-render to show expanded nodes
            renderFullTree();
        }

        function clearSearch() {
            document.getElementById("searchInput").value = "";
            applySearch();
        }

        document.getElementById("searchInput").addEventListener("input", applySearch);

        document.getElementById("depthSlider").addEventListener("input", (e) => {
            const value = parseInt(e.target.value);
            if (value === maxDepth) {
                document.getElementById("depthValue").textContent = "All";
            } else {
                document.getElementById("depthValue").textContent = value;
            }
            expandedNodes.clear();
            renderFullTree();
        });

        // Ctrl+F focus
        document.addEventListener("keydown", (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === "f") {
                e.preventDefault();
                document.getElementById("searchInput").focus();
            }
        });

        // Initialize
        getMaxDepth(treeData);
        getMaxDepth(acroxityData, 0);
        document.getElementById("depthSlider").max = maxDepth;
        renderFullTree();
    </script>
</body>
</html>
